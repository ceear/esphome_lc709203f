name: Compile Examples

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  compile:
    name: ESPHome compile check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip packages to speed up repeated runs
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-esphome-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-esphome-

      # Cache the ESP32 Arduino / IDF platform packages (large, ~500 MB)
      - name: Cache ESPHome build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            /tmp/esphome-cache
          key: ${{ runner.os }}-esphome-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-esphome-

      - name: Install ESPHome
        run: pip install esphome

      - name: Show ESPHome version
        run: esphome version

      - name: Create dummy secrets
        run: |
          cat > examples/secrets.yaml << 'EOF'
          wifi_ssid: "TestNetwork"
          wifi_password: "testpassword"
          mqtt_broker: "192.168.1.1"
          mqtt_username: "esphome"
          mqtt_password: "esphome"
          ota_password: "testota"
          api_encryption_key: "AQIDBAUGBwgJCgsMDQ4PEBESExQVFhcYGRobHB0eHyA="
          EOF

      - name: Compile deep-sleep example
        run: esphome compile examples/esp32-deep-sleep.yaml

      - name: Compile normal example
        run: esphome compile examples/esp32-normal.yaml

      - name: Compile debug example
        run: esphome compile examples/esp32-debug.yaml

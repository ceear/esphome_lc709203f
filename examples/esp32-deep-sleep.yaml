# ─────────────────────────────────────────────────────────────────────────────
# LC709203F Deep Sleep Example
# ─────────────────────────────────────────────────────────────────────────────
#
# Hardware wiring:
#   1S LiPo (+) ──┬──► LC709203F BAT / VBAT pin
#                 └──► Charger + load circuit
#   1S LiPo (-) ──┬──► LC709203F GND
#                 └──► ESP32 GND / system GND
#   ESP32 3V3  ───────► LC709203F VDD  (logic supply, if breakout has separate VDD)
#   ESP32 SDA  ───────► LC709203F SDA  (add 4.7 kΩ pull-up to 3.3 V)
#   ESP32 SCL  ───────► LC709203F SCL  (add 4.7 kΩ pull-up to 3.3 V)
#
# WARNING: Some breakout boards put I2C pull-ups on VBAT (up to 4.2 V).
# That exposes ESP32 I2C pins to >3.3 V – use level-shifted or 3.3 V pull-ups!
#
# Key design points:
#   • LC709203F stays powered from the LiPo at all times.
#   • ESP32 enters deep sleep; the fuel gauge keeps running undisturbed.
#   • On each wake-up this component reads the already-running gauge directly –
#     no INITIAL_RSOC reset, no multi-cycle state machine warm-up.
#   • First component.update call after boot delivers real sensor values.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  device_name: battery-monitor-ds
  friendly_name: "Battery Monitor (Deep Sleep)"
  sleep_duration: 5min
  battery_capacity_mah: "1000"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100  # Run after all components have initialised and WiFi connected
    then:
      # Wait for MQTT broker connection (max 30 s; skip publish if unreachable)
      - wait_until:
          condition:
            mqtt.connected:
          timeout: 30s
      # Trigger a single sensor read; the component returns immediately because
      # setup() already confirmed the gauge is running and values are plausible.
      - component.update: battery_gauge
      # Allow MQTT retain publish to complete before sleeping
      - delay: 1500ms
      - deep_sleep.enter: deep_sleep_ctrl

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password

# Use native ESPHome API instead of MQTT by replacing the mqtt: block with:
# api:
#   encryption:
#     key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true  # Saves ~1 s reconnect time on deep-sleep nodes
  power_save_mode: none

external_components:
  - source:
      type: local
      path: ../components
    components: [lc709203f_deepsleep]

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: false   # Disable I2C scan on every boot to save time

deep_sleep:
  id: deep_sleep_ctrl
  sleep_duration: ${sleep_duration}

sensor:
  - platform: lc709203f_deepsleep
    id: battery_gauge
    # Hardware
    address: 0x0B
    battery_size: ${battery_capacity_mah}
    pack_voltage: "3.8V"   # Standard LiPo (4.2 V max); use "3.7V" for some Li-Ion

    # Deep-sleep strategy: read first, init only when necessary
    update_interval: never  # Only triggered explicitly via component.update
    mode: deep_sleep
    assume_already_initialized: true   # Read existing gauge state on each wake-up
    initialize_if_invalid: true        # Fall back to full init if values are wrong
    force_initialize: false            # Do NOT reset RSOC on every boot

    # Register write control on boot
    write_initial_rsoc_on_boot: false  # ← critical: never reset RSOC in deep-sleep mode
    set_operational_mode_on_boot: true # Safe: wakes gauge if it somehow entered sleep
    set_temperature_mode_on_boot: false
    set_apa_on_boot: false             # APA is already set from first-time init

    # Plausibility thresholds (must both pass to skip re-init)
    valid_voltage_min: 2.5
    valid_voltage_max: 4.35
    valid_rsoc_min: 0
    valid_rsoc_max: 100

    debug_registers: false

    battery_voltage:
      name: "Battery Voltage"
      id: bat_voltage
      retain: true
    battery_level:
      name: "Battery Level"
      id: bat_level
      retain: true

  # Optional: ESP32 internal temperature for context
  - platform: internal_temperature
    name: "ESP32 Temperature"
    retain: false
